name: Deploy PartyKit Server

on:
  push:
    branches: [main]
    paths:
      - 'OP/deck-builder/party/**'
      - 'OP/deck-builder/partykit.json'
      - 'OP/deck-builder/package.json'
  workflow_dispatch: # 手動実行も可能

jobs:
  deploy-partykit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: OP/deck-builder

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: OP/deck-builder/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Deploy to PartyKit
        run: npx partykit deploy --token ${{ secrets.PARTYKIT_TOKEN }}
