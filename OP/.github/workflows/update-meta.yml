name: Update Tournament Meta Data

on:
  schedule:
    # 毎日 午前2時（JST） = 前日 17:00 UTC
    # ※ deploy.yml が 18:00 UTC に走るので、データ更新を先行させる
    - cron: '0 17 * * *'
  workflow_dispatch: # 手動実行も可能

permissions:
  contents: write
  actions: write   # deploy.yml をトリガーするために必要

jobs:
  update-meta:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install requests

      - name: Fetch tournament data
        run: python deck-builder/scripts/fetch_tournament_data.py

      - name: Commit and push if changed
        id: commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deck-builder/public/tournament_stats.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: update tournament stats $(date '+%Y-%m-%d')"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger deploy workflow (if data changed)
        if: steps.commit.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              workflow_id: 'deploy.yml',
              ref:   'main',
            });
            console.log('deploy.yml をトリガーしました');
