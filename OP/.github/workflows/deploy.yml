name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    # 毎日 午前3時（JST） = 前日 18:00 UTC — 最新大会データでサイトを再ビルド
    - cron: '0 18 * * *'
  workflow_dispatch: # 手動実行も可能

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: deck-builder/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install requests

      # cards.json が変わらない限りキャッシュを再利用（初回のみダウンロード）
      - name: Cache card images
        id: cache-images
        uses: actions/cache@v4
        with:
          path: deck-builder/public/images
          key: card-images-${{ hashFiles('scraper/data/cards.json') }}

      - name: Download cardback image
        if: steps.cache-images.outputs.cache-hit != 'true'
        run: |
          mkdir -p deck-builder/public/images
          curl -L -o deck-builder/public/images/cardback.png \
            "https://www.onepiece-cardgame.com/images/cardlist/cardback.png" \
            -H "Referer: https://www.onepiece-cardgame.com/cardlist/" \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/120.0.0.0 Safari/537.36"

      - name: Download card images
        if: steps.cache-images.outputs.cache-hit != 'true'
        run: python scraper/download_images.py

      - name: Fetch latest tournament data
        run: python deck-builder/scripts/fetch_tournament_data.py

      - name: Install dependencies
        run: npm ci
        working-directory: deck-builder

      - name: Build
        run: npm run build
        working-directory: deck-builder

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: deck-builder/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
